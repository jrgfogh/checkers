name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  packages: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check
      - run: npm run type-check:server
      - run: npm test -- --ci
      - run: npm run build

      - name: Copy static files
        run: |
          mkdir -p dist
          cp src/*.html dist
          cp src/*.css dist

      - name: Upload static files as artifact
        uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: build-test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Build Docker image and push to GitHub Container Registry
  docker:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Deploy the Docker image to an Akamai Cloud (Linode) server via SSH.
  # Required repository secrets:
  #   DEPLOY_HOST            – IP address or hostname of the Akamai Cloud server
  #   DEPLOY_USER            – SSH username on the server (e.g. "deploy")
  #   DEPLOY_SSH_PRIVATE_KEY – private SSH key whose public half is in the
  #                            server's ~/.ssh/authorized_keys
  #   DEPLOY_SSH_PASSPHRASE  - passphrase for the private SSH key
  #   DEPLOY_GHCR_TOKEN      – GitHub PAT with read:packages scope, used by the
  #                            server to pull images from ghcr.io
  deploy-server:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: docker
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Compute image reference
        run: |
          # Lowercase for Docker compatibility; compute SHA tag to pin the
          # exact image that was built by the docker job.
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}:sha-${GITHUB_SHA::7}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy to Akamai Cloud
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          script: |
            # Log in to GitHub Container Registry
            echo "${{ secrets.DEPLOY_GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pull the exact image built for this commit
            docker pull ${{ env.IMAGE }}

            # Replace the running container
            docker stop checkers 2>/dev/null || true
            docker rm checkers 2>/dev/null || true
            docker run -d \
              --name checkers \
              --restart unless-stopped \
              -p 3000:3000 \
              ${{ env.IMAGE }}

            # Clean up old images
            docker image prune -f
